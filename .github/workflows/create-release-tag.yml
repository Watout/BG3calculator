name: create-release-tag
run-name: create-release-tag / ${{ inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag/version already merged into main
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: create-release-tag-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  create-release-tag:
    name: create-release-tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure workflow runs from main
        if: github.ref_name != 'main'
        run: |
          Write-Error "create-release-tag 必须从 main 分支触发，当前 ref 为 $env:GITHUB_REF_NAME。"
          exit 1
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.14.0
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable
        shell: pwsh

      - name: Activate pnpm
        run: corepack prepare pnpm@10.32.1 --activate
        shell: pwsh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: pwsh

      - name: Ensure release tag does not already exist remotely
        run: |
          $tag = '${{ inputs.tag }}'
          git fetch --tags origin
          $remoteTag = git ls-remote --tags origin "refs/tags/$tag"
          if (-not [string]::IsNullOrWhiteSpace($remoteTag)) {
            Write-Error "远端 tag $tag 已存在。请改用新的语义化版本，例如递增到下一个版本号。"
            exit 1
          }
        shell: pwsh

      - name: Preflight release metadata
        run: pnpm release:preflight -- --tag "${{ inputs.tag }}"
        shell: pwsh

      - name: Create and push release tag from main HEAD
        run: |
          $tag = '${{ inputs.tag }}'
          $headSha = git rev-parse HEAD
          git tag $tag $headSha
          git push origin "refs/tags/$tag"
        shell: pwsh

      - name: Summarize release handoff
        run: |
          $headSha = git rev-parse HEAD
          @(
            "已完成 create-release-tag：",
            "",
            "- 已确认 workflow 运行在 `main`",
            "- 已执行 `pnpm release:preflight -- --tag ${{ inputs.tag }}`",
            "- 已从远端 `main` 对应的 HEAD 创建并推送新 tag `${{ inputs.tag }}`",
            "- main 提交未被 workflow 修改",
            "- Tag SHA: `$headSha`",
            "",
            "接下来 `release-desktop` workflow 会因 tag push 自动触发。"
          ) -join \"`n\" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
        shell: pwsh
