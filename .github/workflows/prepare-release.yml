name: prepare-release
run-name: prepare-release / ${{ inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag/version to prepare and publish
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: prepare-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: prepare-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure workflow runs from main
        if: github.ref_name != 'main'
        run: |
          Write-Error "prepare-release 必须从 main 分支触发，当前 ref 为 $env:GITHUB_REF_NAME。"
          exit 1
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.14.0
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable
        shell: pwsh

      - name: Activate pnpm
        run: corepack prepare pnpm@10.32.1 --activate
        shell: pwsh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: pwsh

      - name: Ensure release tag does not already exist
        run: |
          $tag = '${{ inputs.tag }}'
          git fetch --tags origin
          $remoteTag = git ls-remote --tags origin "refs/tags/$tag"
          if (-not [string]::IsNullOrWhiteSpace($remoteTag)) {
            Write-Error "远端 tag $tag 已存在。请改用新的语义化版本，例如递增到下一个版本号。"
            exit 1
          }

          $localTag = git tag --list $tag
          if (-not [string]::IsNullOrWhiteSpace($localTag)) {
            Write-Error "本地 tag $tag 已存在。请先删除本地 tag 或改用新的语义化版本。"
            exit 1
          }
        shell: pwsh

      - name: Synchronize declared versions
        run: pnpm release:sync-version -- --tag "${{ inputs.tag }}"
        shell: pwsh

      - name: Preflight release metadata
        run: pnpm release:preflight -- --tag "${{ inputs.tag }}"
        shell: pwsh

      - name: Verify workspace
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
        shell: pwsh

      - name: Commit synchronized release manifests if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json apps/desktop-tauri/package.json apps/desktop-tauri/src-tauri/tauri.conf.json apps/desktop-tauri/src-tauri/Cargo.toml

          git diff --cached --quiet

          if ($LASTEXITCODE -eq 0) {
            "版本文件已与 ${{ inputs.tag }} 对齐，无需新增 commit。"
          } elseif ($LASTEXITCODE -eq 1) {
            git commit -m "chore: prepare release ${{ inputs.tag }}"
          } else {
            Write-Error "git diff --cached --quiet 执行失败，退出码为 $LASTEXITCODE。"
            exit $LASTEXITCODE
          }
        shell: pwsh

      - name: Push main branch
        run: git push origin HEAD:main
        shell: pwsh

      - name: Create and push release tag
        run: |
          $tag = '${{ inputs.tag }}'
          git tag $tag HEAD
          git push origin "refs/tags/$tag"
        shell: pwsh

      - name: Summarize release handoff
        run: |
          @(
            "已完成 prepare-release：",
            "",
            "- 版本文件已同步到 `${{ inputs.tag }}`",
            "- 已执行 `pnpm release:preflight -- --tag ${{ inputs.tag }}`",
            "- 已执行 `pnpm lint` / `pnpm typecheck` / `pnpm test`",
            "- 已将 main 推送到远端",
            "- 已推送新 tag `${{ inputs.tag }}`",
            "",
            "接下来 `release-desktop` workflow 会因 tag push 自动触发。"
          ) -join \"`n\" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
        shell: pwsh
