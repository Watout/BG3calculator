name: desktop-build
run-name: desktop-build / ${{ inputs.target }} / ${{ inputs.request_id }}

on:
  workflow_dispatch:
    inputs:
      target:
        description: Build target to run from the desktop matrix
        required: true
        default: all
        type: choice
        options:
          - all
          - windows-x64
          - macos-universal
      request_id:
        description: Client request id for local remote-build orchestration
        required: false
        default: manual
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  verify:
    name: lint-typecheck-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.14.0
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable
        shell: pwsh

      - name: Activate pnpm
        run: corepack prepare pnpm@10.32.1 --activate
        shell: pwsh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: pwsh

      - name: Lint workspace
        run: pnpm lint
        shell: pwsh

      - name: Typecheck workspace
        run: pnpm typecheck
        shell: pwsh

      - name: Test workspace
        run: pnpm test
        shell: pwsh

  build-desktop:
    needs: verify
    uses: ./.github/workflows/desktop-build-matrix.yml
    with:
      target: ${{ inputs.target }}
    secrets: inherit
