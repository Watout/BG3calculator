name: release-desktop

on:
  push:
    tags:
      - "*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: verify-workspace
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.preflight.outputs.is_prerelease }}
      release_tag: ${{ steps.preflight.outputs.tag }}
      release_version: ${{ steps.preflight.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.14.0
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable
        shell: pwsh

      - name: Activate pnpm
        run: corepack prepare pnpm@10.32.1 --activate
        shell: pwsh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: pwsh

      - name: Preflight release metadata
        id: preflight
        run: pnpm release:preflight -- --tag "${{ github.ref_name }}"
        shell: pwsh

      - name: Verify workspace
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
        shell: pwsh

  build-desktop:
    name: build-${{ matrix.name }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            build_command: pnpm tauri:build:windows
            artifact_name: bg3calculator-windows-x64
            artifact_path: apps/desktop-tauri/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**
          - name: macos-universal
            os: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            build_command: pnpm tauri:build:macos:universal
            artifact_name: bg3calculator-macos-universal
            artifact_path: apps/desktop-tauri/src-tauri/target/universal-apple-darwin/release/bundle/**

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.14.0
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable
        shell: pwsh

      - name: Activate pnpm
        run: corepack prepare pnpm@10.32.1 --activate
        shell: pwsh

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-tauri/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: pwsh

      - name: Build desktop app
        run: ${{ matrix.build_command }}
        shell: pwsh

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          compression-level: 0
          path: ${{ matrix.artifact_path }}

  publish-release:
    name: publish-release
    needs:
      - verify
      - build-desktop
    runs-on: ubuntu-latest

    steps:
      - name: Download bundled artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect release files
        id: collect
        run: pnpm release:collect-assets -- --input release-assets
        shell: pwsh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: ${{ steps.collect.outputs.files }}
          generate_release_notes: true
          name: ${{ needs.verify.outputs.release_tag }}
          overwrite_files: true
          prerelease: ${{ needs.verify.outputs.is_prerelease == 'true' }}
          tag_name: ${{ needs.verify.outputs.release_tag }}
