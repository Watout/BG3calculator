name: release-desktop

on:
  push:
    tags:
      - "*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: verify-workspace
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.preflight.outputs.is_prerelease }}
      release_tag: ${{ steps.preflight.outputs.tag }}
      release_version: ${{ steps.preflight.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.14.0
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable
        shell: pwsh

      - name: Activate pnpm
        run: corepack prepare pnpm@10.32.1 --activate
        shell: pwsh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: pwsh

      - name: Preflight release metadata
        id: preflight
        run: pnpm release:preflight -- --tag "${{ github.ref_name }}"
        shell: pwsh

      - name: Verify workspace
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
        shell: pwsh

  build-desktop:
    needs: verify
    uses: ./.github/workflows/desktop-build-matrix.yml
    with:
      target: all
    secrets: inherit

  publish-release:
    name: publish-release
    needs:
      - verify
      - build-desktop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.14.0
          package-manager-cache: false

      - name: Download bundled artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: false
          path: release-assets
          pattern: bg3calculator-*

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          node scripts/release-publish.mjs
          --input release-assets
          --tag "${{ needs.verify.outputs.release_tag }}"
          --name "${{ needs.verify.outputs.release_tag }}"
          --prerelease "${{ needs.verify.outputs.is_prerelease }}"
        shell: pwsh
